services:
  db:
    image: postgres:17-alpine
    container_name: hub-digital-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hub_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-hub_digital}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hub_digital_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hub} -d ${POSTGRES_DB:-hub_digital}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hub_digital_pgdata:
